name: Daily data build

on:
  schedule:
    - cron: '0 5 * * *'   # 06:00 Lisbon (UTC+1, Apr–Oct)
  workflow_dispatch:       # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl stripe requests

      - name: Run build.py
        env:
          PICTER_JWT:      ${{ secrets.PICTER_JWT }}
          PICTER_CALL_ID:  ${{ secrets.PICTER_CALL_ID }}
          STRIPE_SECRET:   ${{ secrets.STRIPE_SECRET }}
          META_API_KEY:    ${{ secrets.META_API_KEY }}
          META_ACCOUNT_ID: ${{ secrets.META_ACCOUNT_ID }}
        run: python build.py

      - name: Commit and push data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily data update $(date -u +'%Y-%m-%d')"
            git push
          fi
